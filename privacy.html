<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - ProTools Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: linear-gradient(120deg, #e0eafc 0%, #cfdef3 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .small-card { 
            background: white; 
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            max-width: 400px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.6);
        }
        h1 { color: #1e293b; font-size: 1.5rem; margin-bottom: 15px; }
        p { color: #64748b; line-height: 1.5; font-size: 0.95rem; margin-bottom: 20px; }
        .back-btn { 
            display: inline-block;
            background: #764ba2; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: 600;
            transition: 0.3s;
        }
        .back-btn:hover { opacity: 0.9; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="small-card">
        <h1>Privacy Policy 🛡️</h1>
        <p>"We do not collect or store any of your personal data. We use Google Analytics solely to monitor website traffic and improve user experience. Your privacy is our top priority."</p>
        <a href="index.html" class="back-btn">Wapis Jayein</a>
    </div>
</body>
</html>
